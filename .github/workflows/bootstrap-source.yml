name: Bootstrap source tree

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    if: contains(github.event.head_commit.message, '[bootstrap-source]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand source archive
        shell: bash
        run: |
          base64 --decode project-source.tar.gz.b64 | tar -xzf -
          rm -f project-source.tar.gz.b64 .github/workflows/bootstrap-source.yml
      - name: Commit source tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build Vue smart knowledge prototype"
          git push origin main
